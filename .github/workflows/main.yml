name: Customer Churn Modelling Workflow CI Pipeline

on:
  push:
    branches:
      - main
    paths:
      - "MLProject/**" 
      - ".github/workflows/main.yml"
  workflow_dispatch: # For manual triggering 

env:
  # Konfigurasi akses MLflow Tracking Server
  MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
  MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
  MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}

  # Pembatasan agar tidak ada API Request timed out error
  MLFLOW_HTTP_REQUEST_MAX_RETRIES: "7"
  MLFLOW_HTTP_REQUEST_TIMEOUT: "600"
  MLFLOW_TRACKING_SERVER_REQUEST_TIMEOUT: "600"
  
  # Variabel akses file dataset
  TRAIN_PATH: "./telco_preprocessing/train_pca.csv"
  TEST_PATH: "./telco_preprocessing/test_pca.csv"

jobs:
  # 1) Set up job
  mlflow-training-job:
    name: Set up job
    
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0} 
    
    steps:
      # 2) Run actions/checkout
      - name: Run actions/checkout
        uses: actions/checkout@v4

      # 3) Set up Python
      - name: Set up Python environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.13.5"
          miniforge-version: latest
          activate-environment: ml-env

      # 4) Check Env
      - name: Check Env
        run:  |
          echo "=== Environment Variables Checking ==="
          echo "MLflow tracking URI: Configured"

          DATASETS=("$TRAIN_PATH" "$TEST_PATH")

          for filepath in "${DATASET[@]}"; do
            if [ ! -f "$filepath" ]; then
              echo "::error::File dataset tidak ditemukan pada path: $filepath!"
              exit 1
            fi
            echo "File divalidasi: $filepath"
          done
          
          echo "Dataset berhasil divalidasi dan siap digunakan."

      # 5) Install dependencies
      - name: Install dependencies
        run: |
          echo "=== Installing required packages from ./MLProject/conda.yaml ==="
          conda env update --name ml-env --file ./MLProject/conda.yaml 
          
          pip install mlflow==2.19.0

      # 6) Set MLflow Tracking URI
      - name: Set MLflow Tracking URI
        run: | 
          echo "=== Configuring MLflow Tracking Server ==="
          echo "MLFLOW_TRACKING_URI=${{ secrets.MLFLOW_TRACKING_URI }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_USERNAME=${{ secrets.MLFLOW_TRACKING_USERNAME }}" >> $GITHUB_ENV
          echo "MLFLOW_TRACKING_PASSWORD=${{ secrets.MLFLOW_TRACKING_PASSWORD }}" >> $GITHUB_ENV

          echo "Tracking URI & Credentials has been successfully injected to environment."
      
      # 7) Run MLflow project
      - name: Run MLflow project
        run: |
          echo "=== Executing Model Experiment ==="
          
          if ! mlflow run ./MLProject --env-manager=local > mlflow_run.log 2>&1; then
            echo "::error::Eksekusi MLflow gagal! Menampilkan log:"
            cat mlflow_run.log
            exit 1
          fi

          echo "Model experiment has been successfully completed. Log saved."
      
      # 8) Get latest MLflow Run ID
      - name: Get latest MLflow Run ID
        id: extract_run_id
        run: |
          echo "=== Checking for latest experiment Run ID ==="
          # Mengekstrak UUID menggunakan regex dari output standar MLflow
          RUN_ID=$(grep -oP "(?<=Run \(ID ')[^']+" mlflow_run.log | tail -n 1)

          if [ -z "$RUN_ID" ]; then
            echo "::error::Run ID (UUID) tidak ditemukan! Format log mungkin tidak sesuai atau API gagal merespons UUID."
            echo "--- EXECUTION LOG ---"
            cat mlflow_run.log
            exit 1
          fi

          echo "--- SUCCESSFULLY EXTRACTING UUID ---"
          echo "Latest Run ID: $RUN_ID" 

          # Menyimpan Run ID ke GITHUB_OUTPUT agar bisa digunakan di step/job lain (misal: untuk model registry)
          echo "run_id=$RUN_ID" >> $GITHUB_OUTPUT

      # 9) Download model artifacts from Remote MLflow server
      - name: Download model artifacts from MLflow server
        run: | 
          RUN_ID="${{ steps.extract_run_id.outputs.run_id }}"
          echo "=== Downloading model artifacts from MLflow server for Run ID: $RUN_ID ==="

          # Mengambil Experiment ID dari MLflow
          EXP_ID=$(python -c "import mlflow; client = mlflow.tracking.MlflowClient(); print(client.get_run('$RUN_ID').info.experiment_id)")
          echo "Experiment ID: $EXP_ID"

          # Menyusun struktur folder menyerupai direktori 'mlruns'
          TARGET_DIR="./mlruns/$EXP_ID/$RUN_ID/artifacts"
          mkdir -p "$TARGET_DIR"

          # Download seluruh artefak
          mlflow artifacts download \
            --run-id "$RUN_ID" \
            --dst-path "$TARGET_DIR"

          echo "Model artifacts successfully downloaded to: $TARGET_DIR"

          echo "Downloaded artifact files:"
          ls -R "$TARGET_DIR"
      
      # 10) Install Python dependencies (post-training)
      - name: Install Python Dependencies
        run: | 
          echo "=== Required packages already installed in previous steps! ==="

      # 11) Upload model artifacts to GitHub (with GitHub Artifacts)
      - name: Upload to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-artifacts-${{ steps.extract_run_id.outputs.run_id }}
          # Upload seluruh file artefak ke GitHub Actions
          path: |
            mlruns/
            mlflow_run.log
          
          if-no-files-found: warn
          retention_days: 3 # Waktu penyimpanan artefak sebelum dihapus otomatis

      # 12) Build Docker Model (ukuran ringan)
      - name: Build Docker Model
        run: |
          RUN_ID="${{ steps.extract_run_id.outputs.run_id }}"
          echo "=== Building Lightweight Docker Model for Run ID: $RUN_ID ==="

          # Mengambil Experiment ID
          EXP_ID=$(python -c "import mlflow; client = mlflow.tracking.MlflowClient(); print(client.get_run('$RUN_ID').info.experiment_id)")

          # Menentukan root folder dari artifacts
          ROOT_DIR="./mlruns/$EXP_ID/$RUN_ID/artifacts"
          echo "Searching model directory dynamically on: $ROOT_DIR"

          # Mencari file 'MLmodel' secara otomatis dengan perintah 'find'
          MLMODEL_PATH=$(find "$ROOT_DIR" -name "MLmodel" | head -n 1)

          # Exception handling (apabila model gagal ter-log)
          if [ -z "$MLMODEL_PATH" ]; then
            echo "::error::File MLmodel not found on $ROOT_DIR! Make sure log_model process done successfully."

          # Mengekstrak nama direktori tempat MLmodel berada
          LOCAL_MODEL_URI=$(dirname "$MLMODEL_PATH")

          echo "Model successfully found at: $LOCAL_MODEL_URI"
          
          # Membangun Docker Model memanfaatkan flag --enable-mlserver agar ukurannya ringan
          mlflow models build-docker \
            --model-uri "$LOCAL_MODEL_URI"
            --name "customer-churn-prediction-system:local" \
            --enable-mlserver

      # 13) Log In to Docker Hub
      - name: Log In to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # 14) Tag Docker Image
      - name: Tag Docker Image
        run: |
          DOCKER_USER="${{ secrets.DOCKER_HUB_USERNAME }}"
          IMAGE_NAME="customer-churn-prediction-system"

          echo "=== Creating Tag Image for Docker Hub ==="

          # Tag 1: Menggunakan Commit SHA agar setiap build memiliki versi unik (Immutable)
          docker tag $IMAGE_NAME:local $DOCKER_USER/$IMAGE_NAME:${{ github.sha }}

          # Tag 2: Menggunakan tag 'latest' untuk deployment otomatis
          docker tag $IMAGE_NAME:local $DOCKER_USER/$IMAGE_NAME:latest

      # 15) Push Docker Image
      - name: Push Docker Image
        run: |
          DOCKER_USER="${{ secrets.DOCKER_HUB_USERNAME }}"
          IMAGE_NAME="customer-churn-prediction-system"

          echo "=== Uploading Docker Image to Docker Hub Registry ==="
          docker push $DOCKER_USER/$IMAGE_NAME:${{ github.sha }}
          docker push $DOCKER_USER/$IMAGE_NAME:latest

          echo "Successfully publishing Docker Image `$IMAGE_NAME` to Docker Hub!"
